{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}Sign In | JobBoard{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5 col-md-7">
        <div class="form-card">
            <div class="text-center mb-4">
                <h2 class="fw-bold">Sign In</h2>
                <p class="text-muted">Welcome back! Please enter your details.</p>
            </div>
            
            {% crispy form %}
            
            <div class="text-center mt-4 text-muted small">
                Don't have an account? <a href="{% url 'register' %}" class="text-primary fw-bold">Sign Up</a>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const form = document.querySelector('.form-card form');
        if (form) {
            form.addEventListener('submit', function() {
                const btn = form.querySelector('input[type="submit"], button[type="submit"]');
                if (btn) {
                    // Set timeout to ensure the form submits before disabling (for some browsers)
                    setTimeout(() => {
                        btn.disabled = true;
                        if (btn.tagName === 'INPUT') {
                            btn.value = 'Signing in...';
                        } else {
                            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span> Signing in...';
                        }
                    }, 50);
                }
            });
        }
    });
</script>
{% endblock %}
