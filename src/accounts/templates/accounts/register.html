{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}Register | JobBoard{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6 col-md-8">
        <div class="form-card">
            <div class="text-center mb-4">
                <h2 class="fw-bold">Create Account</h2>
                <p class="text-muted">Join our community of professionals and companies.</p>
            </div>
            
            {% crispy form %}
            
            <div class="text-center mt-4 text-muted small">
                Already have an account? <a href="{% url 'login' %}" class="text-primary fw-bold">Sign In</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
