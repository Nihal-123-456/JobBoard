{% extends "base.html" %}
{% block title %}Delete Job | JobBoard{% endblock %}

{% block content %}
<div class="container" style="margin-top: 100px;">
    <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8">
            <div class="form-card border-danger">
                <div class="text-center mb-4">
                    <div class="text-danger mb-3">
                        <i class="bi bi-exclamation-triangle fs-1"></i>
                    </div>
                    <h2 class="fw-bold text-danger">Delete Job Listing</h2>
                    <p class="text-muted">This action cannot be undone.</p>
                </div>
                
                <div class="alert alert-warning text-center rounded-3 p-3">
                    Are you sure you want to delete the job posting for<br>
                    <strong>"{{ job.title }}"</strong>?
                </div>
                
                <form class="delete-job-form mt-4" method="post">
                    {% csrf_token %}
                    <button type="submit" class="w-100 btn btn-danger py-2 fw-bold rounded-pill mb-2">Yes, Delete Listing</button>
                    <a href="{% url 'employer-dashboard' %}" class="w-100 btn btn-light py-2 fw-bold rounded-pill border">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const form = document.querySelector('.delete-job-form');
        if (form) {
            form.addEventListener('submit', function() {
                const btn = form.querySelector('button[type="submit"]');
                if (btn) {
                    // Set timeout to ensure the form submits before disabling (for some browsers)
                    setTimeout(() => {
                        btn.disabled = true;
                        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span> Deleting...';
                    }, 50);
                }
            });
        }
    });
</script>
{% endblock %}
