{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}Create Job | JobBoard{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="form-card">
            <div class="text-center mb-4">
                <h2 class="fw-bold">Create a New Job Listing</h2>
                <p class="text-muted">Fill out the details below to publish your opening.</p>
            </div>
            
            {% crispy form %}
        </div>
    </div>
</div>
{% endblock %}
