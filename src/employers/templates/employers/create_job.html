{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}Create Job | JobBoard{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="form-card">
            <div class="text-center mb-4">
                <h2 class="fw-bold">Create a New Job Listing</h2>
                <p class="text-muted">Fill out the details below to publish your opening.</p>
            </div>
            
            {% crispy form %}
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const form = document.querySelector('.form-card form');
        if (form) {
            form.addEventListener('submit', function() {
                const btn = form.querySelector('input[type="submit"], button[type="submit"]');
                if (btn) {
                    // Set timeout to ensure the form submits before disabling (for some browsers)
                    setTimeout(() => {
                        btn.disabled = true;
                        if (btn.tagName === 'INPUT') {
                            btn.value = 'Creating...';
                        } else {
                            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span> Creating...';
                        }
                    }, 50);
                }
            });
        }
    });
</script>
{% endblock %}
