{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}Add Education | JobBoard{% endblock %}

{% block content %}
<div class="container" style="margin-top: 100px;">
    <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8">
            <div class="form-card">
                <div class="text-center mb-4">
                    <h2 class="fw-bold">Add Education</h2>
                </div>
                
                {% crispy form %}
                
                <a href="{% url 'jobseeker-profile' %}" class="btn btn-outline-secondary w-100 py-2 mt-2 fw-bold rounded-pill">Cancel</a>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const form = document.querySelector('.form-card form');
        if (form) {
            form.addEventListener('submit', function() {
                const btn = form.querySelector('input[type="submit"], button[type="submit"]');
                if (btn) {
                    // Set timeout to ensure the form submits before disabling (for some browsers)
                    setTimeout(() => {
                        btn.disabled = true;
                        if (btn.tagName === 'INPUT') {
                            btn.value = 'Saving...';
                        } else {
                            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span> Saving...';
                        }
                    }, 50);
                }
            });
        }
    });
</script>
{% endblock %}
