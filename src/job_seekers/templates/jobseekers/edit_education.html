{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}Edit Education | JobBoard{% endblock %}

{% block content %}
<div class="container" style="margin-top: 100px;">
    <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8">
            <div class="form-card">
                <div class="text-center mb-4">
                    <h2 class="fw-bold">Edit Education</h2>
                </div>
                
                {% crispy form %}
                
                <a href="{% url 'jobseeker-profile' %}" class="btn btn-outline-secondary w-100 py-2 mt-2 fw-bold rounded-pill">Cancel</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
